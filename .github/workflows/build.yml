name: Build HTML to APK (Cordova Debug)
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Cordova
        run: npm install -g cordova
      - name: Create Cordova project
        run: |
          cordova create myapp com.example.myapp MyApp
          cp www/index.html myapp/www/index.html
          cp config.xml myapp/config.xml
          cd myapp && cordova platform add android
          cordova build android
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk